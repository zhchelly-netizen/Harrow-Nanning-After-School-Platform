<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harrow Games 2025-26 | Harrow LiDe School Nanning</title>
    <link rel="stylesheet" href="styles/main.css?v=20260319e">
    <link rel="stylesheet" href="styles/harrow-games.css?v=20260605f">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <button class="language-toggle" id="language-toggle" onclick="window.location.href='language-selection.html'">
        <span class="flag-emoji">&#x1F1E8;&#x1F1F3;</span><span class="flag-separator">/</span><span class="flag-emoji">&#x1F1EC;&#x1F1E7;</span>
    </button>
    <div class="app-container">
        <header class="sub-header">
            <div class="sub-header-top">
                <button class="back-button" onclick="window.location.href='index.html'">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M19 12H5M12 19l-7-7 7-7"/>
                    </svg>
                    <span>Back</span>
                </button>
                <img src="images/harrow-logo-small-white.png" alt="Harrow Logo" class="sub-header-logo">
            </div>
            <h1 class="page-title">Harrow Games 2025-26</h1>
            <p class="page-subtitle">Live Standings &amp; Match Tracker</p>
        </header>

        <!-- Day Tabs -->
        <div class="games-tabs">
            <button class="games-tab active" data-day="day2">Day 2 &middot; June 5</button>
            <button class="games-tab" data-day="day3">Day 3 &middot; June 6</button>
        </div>

        <main class="games-content">
            <!-- DAY 2 -->
            <div id="day2-section" class="day-section active">
                <!-- U12 Football -->
                <div class="category-header">
                    <h2>U12 Football</h2>
                    <span class="sport-icon">⚽</span>
                </div>
                <div class="gender-tabs" data-category="day2-u12">
                    <button class="gender-tab active" data-gender="boys">Boys</button>
                    <button class="gender-tab" data-gender="girls">Girls</button>
                </div>
                <div id="day2-u12-content"></div>

                <!-- U14 Basketball -->
                <div class="category-header">
                    <h2>U14 Basketball</h2>
                    <span class="sport-icon">🏀</span>
                </div>
                <div class="gender-tabs" data-category="day2-u14">
                    <button class="gender-tab active" data-gender="boys">Boys</button>
                    <button class="gender-tab" data-gender="girls">Girls</button>
                </div>
                <div id="day2-u14-content"></div>
            </div>

            <!-- DAY 3 -->
            <div id="day3-section" class="day-section">
                <!-- U12 Basketball -->
                <div class="category-header">
                    <h2>U12 Basketball</h2>
                    <span class="sport-icon">🏀</span>
                </div>
                <div class="gender-tabs" data-category="day3-u12">
                    <button class="gender-tab active" data-gender="boys">Boys</button>
                    <button class="gender-tab" data-gender="girls">Girls</button>
                </div>
                <div id="day3-u12-content"></div>

                <!-- U14 Football -->
                <div class="category-header">
                    <h2>U14 Football</h2>
                    <span class="sport-icon">⚽</span>
                </div>
                <div class="gender-tabs" data-category="day3-u14">
                    <button class="gender-tab active" data-gender="boys">Boys</button>
                    <button class="gender-tab" data-gender="girls">Girls</button>
                </div>
                <div id="day3-u14-content"></div>
            </div>

            <div id="update-time" style="text-align:center; padding:1.5rem; color:#888; font-size:0.85rem;">Loading...</div>
        </main>

        <footer class="main-footer">
            <p class="footer-motto">Educational Excellence for Life and Leadership</p>
            <p class="footer-department">Enrichment Department</p>
            <p class="footer-copyright">&copy; 2026 Harrow LiDe School Nanning</p>
        </footer>
    </div>

    <script>
    (function() {
        const DATA_URL = 'data/harrow-games-data.json';
        let allData = {};
        let currentDay = 'day2';
        let currentGender = {
            'day2-u12': 'boys',
            'day2-u14': 'boys',
            'day3-u12': 'boys',
            'day3-u14': 'boys'
        };

        // ---- Language ----
        const lang = sessionStorage.getItem('selectedLanguage') || 'en';

        const T = {
            // Group stage
            groupStage:        { en: 'Group Stage',          zh: '小组赛' },
            roundRobin:        { en: 'Round Robin',           zh: '循环赛' },
            group:             { en: 'GROUP',                 zh: '小组' },
            team:              { en: 'Team',                  zh: '队伍' },
            fullSchedule:      { en: 'Full Schedule',         zh: '完整赛程' },
            knockoutStage:     { en: 'Knockout Stage',        zh: '淘汰赛' },
            // Bracket tabs
            cup:               { en: 'Cup',                   zh: '奖杯' },
            plate:             { en: 'Plate',                 zh: '奖盘' },
            // Bracket rounds
            quarterFinals:     { en: 'Quarter Finals',        zh: '四分之一决赛' },
            QF1:               { en: 'QF1',                   zh: '四分之一决赛 1' },
            QF2:               { en: 'QF2',                   zh: '四分之一决赛 2' },
            QF3:               { en: 'QF3',                   zh: '四分之一决赛 3' },
            QF4:               { en: 'QF4',                   zh: '四分之一决赛 4' },
            semiFinals:        { en: 'Semi Finals',           zh: '半决赛' },
            SF1:               { en: 'SF1',                   zh: '半决赛 1' },
            SF2:               { en: 'SF2',                   zh: '半决赛 2' },
            finals:            { en: 'Finals',                zh: '决赛' },
            plateSemiFinals:   { en: 'Plate Semi Finals',     zh: '奖盘半决赛' },
            plateFinals:       { en: 'Plate Finals',          zh: '奖盘决赛' },
            // Round labels
            boysRound:         { en: 'Boys Round',            zh: '男子第' },
            girlsRound:        { en: 'Girls Round',           zh: '女子第' },
            roundSuffix:       { en: '',                      zh: '轮' },
            // Match labels
            final:             { en: 'Final',                 zh: '决赛' },
            thirdPlace:        { en: '3rd Place',             zh: '季军赛' },
            plateFinal:        { en: 'Plate Final',           zh: '奖盘决赛' },
            plateThird:        { en: 'Plate 3rd',             zh: '奖盘季军' },
            p9thPlayoff:       { en: '9th Place Play-off',    zh: '第9名排位赛' },
            p9thPlace:         { en: '9th Place',             zh: '第9名' },
            // Placeholders
            winner:            { en: 'Winner',                zh: '胜者' },
            loser:             { en: 'Loser',                 zh: '负者' },
            rank:              { en: 'Rank',                  zh: '排名' },
            // Misc
            noData:            { en: 'No data',               zh: '暂无数据' },
            noMatchData:       { en: 'No match data available', zh: '暂无比赛数据' },
            loading:           { en: 'Loading...',            zh: '加载中...' },
            dataFailed:        { en: 'Data loading failed. Please refresh.', zh: '数据加载失败，请刷新。' },
            updated:           { en: 'Updated',               zh: '更新时间' },
            back:              { en: 'Back',                  zh: '返回' },
            // Gender tabs
            boys:              { en: 'Boys',                  zh: '男子' },
            girls:             { en: 'Girls',                 zh: '女子' },
            // Team names
            teams: {
                'Appi':           { en: 'Appi',                zh: '安比' },
                'Bangkok':        { en: 'Bangkok',             zh: '曼谷' },
                'Bangkok Lions':  { en: 'Bangkok Lions',       zh: '曼谷雄狮' },
                'Beijing':        { en: 'Beijing',             zh: '北京' },
                'Haikou':         { en: 'Haikou',              zh: '海口' },
                'Hengqin':        { en: 'Hengqin',             zh: '横琴' },
                'Hong Kong':      { en: 'Hong Kong',           zh: '香港' },
                'London':         { en: 'London',              zh: '伦敦' },
                'London B':       { en: 'London B',            zh: '伦敦B队' },
                'Nanning':        { en: 'Nanning',             zh: '南宁' },
                'Shanghai':       { en: 'Shanghai',            zh: '上海' },
                'Shenzhen':       { en: 'Shenzhen',            zh: '深圳' },
            },
        };

        function _(key) {
            const entry = T[key];
            if (!entry) return key;
            return entry[lang] || entry['en'];
        }

        function tn(name) {
            const entry = T.teams[name];
            if (!entry) return name;
            return entry[lang] || entry['en'];
        }

        // Translate round labels like "Boys Round 1", "Quarter Finals 1 (A1vB4)", etc.
        function translateRound(round) {
            if (!round) return '';
            if (lang === 'zh') {
                // Boys Round N -> 男子第N轮, Girls Round N -> 女子第N轮
                round = round.replace(/^Boys Round (\d+)/, _('boysRound') + '$1' + _('roundSuffix'));
                round = round.replace(/^Boys Round$/, _('boysRound') + '1' + _('roundSuffix'));
                round = round.replace(/^Girls Round (\d+)/, _('girlsRound') + '$1' + _('roundSuffix'));
                // Quarter Finals N (A1vB4) -> 四分之一决赛 N (A1vB4)
                round = round.replace(/Quarter Finals (\d)/, _('quarterFinals') + ' $1');
                // Semi Finals -> 半决赛
                round = round.replace(/Semi Finals/, _('semiFinals'));
                // Plate Semi Finals -> 奖盘半决赛
                round = round.replace(/Plate Semi Finals/, _('plateSemiFinals'));
                // Plate Finals -> 奖盘决赛
                round = round.replace(/Plate Finals/, _('plateFinals'));
                // Final(s) -> 决赛
                round = round.replace(/Finals?/, _('finals'));
                // 3rd Place -> 季军赛
                round = round.replace(/3rd Place/, _('thirdPlace'));
            }
            return round;
        }

        // Convert Bangkok time (GMT+7) to Beijing time (GMT+8), +1 hour
        function toBeijingTime(ko) {
            if (!ko) return '';
            const m = ko.match(/^(\d{2}):(\d{2})$/);
            if (!m) return ko;
            let h = parseInt(m[1], 10);
            const min = m[2];
            h = (h + 1) % 24;
            const hh = String(h).padStart(2, '0');
            return hh + ':' + min + ' ' + (lang === 'zh' ? '北京时间' : 'CST');
        }

        // ---- Init ----
        document.addEventListener('DOMContentLoaded', () => {
            applyLanguageToStatic();
            loadData();
            setupTabs();
        });

        function applyLanguageToStatic() {
            // Header
            const backBtn = document.querySelector('.back-button span');
            if (backBtn) backBtn.textContent = _('back');

            const subtitle = document.querySelector('.page-subtitle');
            if (subtitle) subtitle.textContent = lang === 'zh' ? '实时积分 & 比赛追踪' : 'Live Standings & Match Tracker';

            // Footer
            const dept = document.querySelector('.footer-department');
            if (dept) dept.textContent = lang === 'zh' ? '拓展课程部' : 'Enrichment Department';

            // Gender tab buttons
            document.querySelectorAll('.gender-tab').forEach(tab => {
                const g = tab.dataset.gender;
                if (g === 'boys') tab.textContent = _('boys');
                if (g === 'girls') tab.textContent = _('girls');
            });
        }

        // ---- Tabs ----
        function setupTabs() {
            // Day tabs
            document.querySelectorAll('.games-tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    document.querySelectorAll('.games-tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    currentDay = tab.dataset.day;
                    document.querySelectorAll('.day-section').forEach(s => s.classList.remove('active'));
                    document.getElementById(currentDay + '-section').classList.add('active');
                    renderAll();
                });
            });
            // Gender tabs (per category)
            document.querySelectorAll('.gender-tabs').forEach(container => {
                container.querySelectorAll('.gender-tab').forEach(tab => {
                    tab.addEventListener('click', () => {
                        container.querySelectorAll('.gender-tab').forEach(t => t.classList.remove('active'));
                        tab.classList.add('active');
                        const cat = container.dataset.category;
                        currentGender[cat] = tab.dataset.gender;
                        renderAll();
                    });
                });
            });
            // Bracket tabs (delegated)
            document.addEventListener('click', function(e) {
                if (e.target.classList.contains('bracket-tab')) {
                    const parent = e.target.closest('.knockout-stage');
                    if (!parent) return;
                    parent.querySelectorAll('.bracket-tab').forEach(t => t.classList.remove('active'));
                    e.target.classList.add('active');
                    parent.querySelectorAll('.bracket-container').forEach(c => c.style.display = 'none');
                    const target = parent.querySelector('.' + e.target.dataset.bracket + '-bracket');
                    if (target) target.style.display = 'flex';
                }
            });
        }

        // ---- Data ----
        async function loadData() {
            try {
                const resp = await fetch(DATA_URL + '?t=' + Date.now());
                allData = await resp.json();
                renderAll();
                const timeStr = new Date().toLocaleString(lang === 'zh' ? 'zh-CN' : 'en-US', { timeZone: 'Asia/Shanghai' });
                document.getElementById('update-time').textContent = _('updated') + ': ' + timeStr;
            } catch (e) {
                document.getElementById('update-time').textContent = _('dataFailed');
                console.error('Failed to load data:', e);
            }
        }

        // ---- Render ----
        function renderAll() {
            if (!allData || Object.keys(allData).length === 0) return;
            if (currentDay === 'day2') {
                renderCategory('day2-u12-content', 'day2_u12', currentGender['day2-u12']);
                renderCategory('day2-u14-content', 'day2_u14', currentGender['day2-u14']);
            } else {
                renderCategory('day3-u12-content', 'day3_u12', currentGender['day3-u12']);
                renderCategory('day3-u14-content', 'day3_u14', currentGender['day3-u14']);
            }
        }

        function renderCategory(containerId, key, gender) {
            const container = document.getElementById(containerId);
            if (!container) return;
            const data = allData[key];
            if (!data) {
                container.innerHTML = '<div class="loading">' + _('noData') + '</div>';
                return;
            }

            const matches = data.matches.filter(m => {
                const mg = (m.gender || '').toLowerCase();
                if (mg === gender.toLowerCase()) return true;
                // For knockout matches with unknown gender, use row parity:
                // these should already be resolved by the scraper now
                return false;
            });

            if (matches.length === 0) {
                container.innerHTML = '<div class="loading">' + _('noMatchData') + '</div>';
                return;
            }

            const prefix = gender === 'boys' ? 'Boys-' : 'Girls-';
            const groupKeys = Object.keys(data.groups || {}).filter(k => k.startsWith(prefix));
            const isGirlsSingle = groupKeys.length === 1 && groupKeys[0].includes('Single');

            let html = '';

            if (gender === 'boys') {
                html += renderGroupStage(matches, groupKeys, prefix);
                html += renderKnockoutBracket(matches, groupKeys, prefix);
            } else if (isGirlsSingle) {
                html += renderSingleGroup(matches, groupKeys[0]);
            } else {
                html += renderGroupStage(matches, groupKeys, prefix);
                html += renderKnockoutBracket(matches, groupKeys, prefix);
            }

            html += '<h3 class="section-title">' + _('fullSchedule') + '</h3>';
            html += renderMatches(matches);

            container.innerHTML = html;
        }

        // ---- Group Stage ----
        function renderGroupStage(matches, groupKeys, prefix) {
            if (groupKeys.length === 0) return '';
            let html = '<div class="group-stage">';
            html += '<h3 class="section-title">' + _('groupStage') + '</h3>';
            html += '<div class="groups-grid">';

            groupKeys.forEach(gk => {
                const label = gk.replace(prefix, '');
                const groupMatches = matches.filter(m => m.group === gk && m.type === 'group' && m.round);
                const standings = calculateStandings(groupMatches, gk);
                const headerClass = gk.includes('Girls') ? 'group-girls' :
                                    gk.includes('-A') ? 'group-a' : 'group-b';
                const title = gk.includes('Single') ? _('group') : _('group') + ' ' + label;
                html += renderStandingsTable(title, headerClass, standings);
            });

            html += '</div></div>';
            return html;
        }

        function renderSingleGroup(matches, groupKey) {
            const groupMatches = matches.filter(m => m.type === 'group' && m.round);
            const standings = calculateStandings(groupMatches, groupKey);
            let html = '<div class="group-stage">';
            html += '<h3 class="section-title">' + _('roundRobin') + '</h3>';
            html += '<div class="groups-grid">';
            html += renderStandingsTable(_('group'), 'group-girls', standings);
            html += '</div></div>';
            return html;
        }

        function renderStandingsTable(title, headerClass, standings) {
            let html = '<div class="group-card">';
            html += '<div class="group-card-header ' + headerClass + '">' + title + '</div>';
            html += '<div class="group-card-body"><div class="standings-table">';
            html += '<div class="standings-header">';
            html += '<span class="col-rank">#</span><span class="col-team">' + _('team') + '</span>';
            html += '<span class="col-stat">' + (lang === 'zh' ? '场' : 'P') + '</span>';
            html += '<span class="col-stat">' + (lang === 'zh' ? '胜' : 'W') + '</span>';
            html += '<span class="col-stat">' + (lang === 'zh' ? '平' : 'D') + '</span>';
            html += '<span class="col-stat">' + (lang === 'zh' ? '负' : 'L') + '</span>';
            html += '<span class="col-stat">' + (lang === 'zh' ? '进' : 'GF') + '</span>';
            html += '<span class="col-stat">' + (lang === 'zh' ? '失' : 'GA') + '</span>';
            html += '<span class="col-stat">' + (lang === 'zh' ? '净' : 'GD') + '</span>';
            html += '<span class="col-pts">' + (lang === 'zh' ? '分' : 'PTS') + '</span>';
            html += '</div>';

            standings.forEach((team, idx) => {
                const rc = idx === 0 ? 'gold' : idx === 1 ? 'silver' : idx === 2 ? 'bronze' : 'normal';
                const nn = team.team === 'Nanning';
                const gdSign = team.gd > 0 ? '+' : '';
                html += '<div class="standings-row' + (nn ? ' nanning-row' : '') + '">';
                html += '<span class="col-rank"><span class="rank-badge ' + rc + '">' + (idx + 1) + '</span></span>';
                html += '<span class="col-team' + (nn ? ' nanning' : '') + '">' + (nn ? '&#x1F525; ' : '') + tn(team.team) + '</span>';
                html += '<span class="col-stat">' + team.p + '</span><span class="col-stat">' + team.w + '</span>';
                html += '<span class="col-stat">' + team.d + '</span><span class="col-stat">' + team.l + '</span>';
                html += '<span class="col-stat">' + team.gf + '</span><span class="col-stat">' + team.ga + '</span>';
                html += '<span class="col-stat gd-col">' + gdSign + team.gd + '</span>';
                html += '<span class="col-pts' + (nn ? ' nanning' : '') + '">' + team.pts + '</span>';
                html += '</div>';
            });

            html += '</div></div></div>';
            return html;
        }

        // ---- Standings Calc ----
        // Uses official_ranking from CSV when available, falls back to points/GD sort

        function calculateStandings(matches, groupKey) {
            const s = {};
            matches.forEach(m => {
                if (!s[m.home]) s[m.home] = { team: m.home, p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0 };
                if (!s[m.away]) s[m.away] = { team: m.away, p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0 };
                if (m.home_score !== null && m.away_score !== null) {
                    s[m.home].p++; s[m.away].p++;
                    s[m.home].gf += m.home_score; s[m.home].ga += m.away_score;
                    s[m.away].gf += m.away_score; s[m.away].ga += m.home_score;
                    if (m.home_score > m.away_score) { s[m.home].w++; s[m.home].pts+=3; s[m.away].l++; }
                    else if (m.home_score < m.away_score) { s[m.away].w++; s[m.away].pts+=3; s[m.home].l++; }
                    else { s[m.home].d++; s[m.away].d++; s[m.home].pts+=1; s[m.away].pts+=1; }
                }
            });
            const vals = Object.values(s).map(t => ({ ...t, gd: t.gf - t.ga }));

            // Use official ranking if available (from CSV SF/Plate data)
            let officialRanking = {};
            try { officialRanking = allData[currentDayKey]?.official_ranking || {}; } catch(e) {}
            const official = officialRanking[groupKey];
            if (official && official.length > 0) {
                // Sort by official position, teams not in official list go to end sorted by pts
                vals.sort((a, b) => {
                    const posA = official.indexOf(a.team);
                    const posB = official.indexOf(b.team);
                    if (posA >= 0 && posB >= 0) return posA - posB;
                    if (posA >= 0) return -1;
                    if (posB >= 0) return 1;
                    // Fallback for teams not in official ranking
                    if (b.pts !== a.pts) return b.pts - a.pts;
                    return (b.gf - b.ga) - (a.gf - a.ga);
                });
            } else {
                // No official ranking, fall back to points/GD sort
                vals.sort((a,b) => {
                    if (b.pts !== a.pts) return b.pts - a.pts;
                    if (b.w !== a.w) return b.w - a.w;
                    const gdA = a.gf - a.ga, gdB = b.gf - b.ga;
                    if (gdB !== gdA) return gdB - gdA;
                    return b.gf - a.gf;
                });
            }
            return vals;
        }

        // ---- Knockout ----
        function renderKnockoutBracket(matches, groupKeys, prefix) {
            const groupAKey = groupKeys.find(k => k.includes('-A'));
            const groupBKey = groupKeys.find(k => k.includes('-B'));
            if (!groupAKey || !groupBKey) return '';

            const mA = matches.filter(m => m.group === groupAKey && m.type === 'group' && m.round);
            const mB = matches.filter(m => m.group === groupBKey && m.type === 'group' && m.round);
            if (mA.length === 0 || mB.length === 0) return '';

            const sA = calculateStandings(mA, groupAKey);
            const sB = calculateStandings(mB, groupBKey);
            if (sA.length === 0 || sB.length === 0) return '';

            const ageKey = Object.keys(allData).find(k =>
                allData[k].groups && Object.keys(allData[k].groups).includes(groupAKey)
            );
            const is14 = ageKey && ageKey.includes('u14');
            const isGirls = prefix === 'Girls-';
            const teamsPerGroup = sA.length; // 4 or 5 teams per group
            const done = isGroupComplete(mA) && isGroupComplete(mB);
            const suffix = done ? '' : ' *';

            let html = '<div class="knockout-stage">';
            html += '<h3 class="section-title">' + _('knockoutStage') + '</h3>';

            html += '<div class="bracket-tabs">';
            html += '<button class="bracket-tab active" data-bracket="cup">' + _('cup') + '</button>';
            html += '<button class="bracket-tab" data-bracket="plate">' + _('plate') + '</button>';
            html += '</div>';

            const bracketId = 'bracket-' + (ageKey || 'unknown');
            html += '<div class="bracket-container cup-bracket" id="' + bracketId + '-cup">';
            html += renderCupBracket(sA, sB, is14, isGirls, teamsPerGroup, mA, mB, matches);
            html += '</div>';
            html += '<div class="bracket-container plate-bracket" id="' + bracketId + '-plate" style="display:none;">';
            html += renderPlateBracket(sA, sB, is14, isGirls, teamsPerGroup, mA, mB, matches);
            html += '</div>';

            // 9th place play-off for 5-team groups (U14 only)
            if (teamsPerGroup >= 5) {
                html += '<div class="bracket-round" style="margin-top:20px;">';
                html += '<div class="bracket-round-title">' + _('p9thPlayoff') + '</div>';
                html += renderMatch(_('p9thPlace'), tn(getTeam(sA,4)) + suffix, tn(getTeam(sB,4)) + suffix, 'plate');
                html += '</div>';
            }

            html += '</div>';
            return html;
        }

        function isGroupComplete(matches) {
            return matches.length > 0 && matches.every(m => m.home_score !== null && m.away_score !== null);
        }

        function renderCupBracket(sA, sB, isU14, isGirls, teamsPerGroup, mA, mB, allMatches) {
            const done = isGroupComplete(mA) && isGroupComplete(mB);
            const suffix = done ? '' : ' *';
            let html = '';

            // Helper: find match by type, preferring ones with real team names
            function findByType(type) {
                const matches = allMatches.filter(m => m.type === type);
                return matches.length > 0 ? matches : null;
            }

            // ========== QUARTER-FINALS ==========
            // U12: has QF (A1vB4, A2vB3, B1vA4, B2vA3)
            // U14 Boys: NO QF, straight to SF
            // U14 Girls: has QF
            if (!(isU14 && !isGirls)) {
                html += '<div class="bracket-round"><div class="bracket-round-title">' + _('quarterFinals') + '</div>';
                const qfs = findByType('quarter_final');
                if (qfs) {
                    // Sort by QF number
                    qfs.sort((a, b) => {
                        const numA = parseInt(a.round.match(/(\d+)/)?.[1] || '0');
                        const numB = parseInt(b.round.match(/(\d+)/)?.[1] || '0');
                        return numA - numB;
                    });
                    const qfSlots = [
                        { fb_h: () => getTeam(sA,0), fb_a: () => getTeam(sB,3) },
                        { fb_h: () => getTeam(sA,1), fb_a: () => getTeam(sB,2) },
                        { fb_h: () => getTeam(sB,0), fb_a: () => getTeam(sA,3) },
                        { fb_h: () => getTeam(sB,1), fb_a: () => getTeam(sA,2) },
                    ];
                    for (let i = 0; i < Math.max(qfs.length, 4); i++) {
                        const qf = qfs[i];
                        if (qf && qf.home && qf.home !== 'TBD' && qf.away && qf.away !== 'TBD') {
                            html += renderMatch(_('QF') + (i+1), tn(qf.home) + suffix, tn(qf.away) + suffix, '', qf);
                        } else if (i < qfSlots.length) {
                            html += renderMatch(_('QF') + (i+1), tn(qfSlots[i].fb_h()) + suffix, tn(qfSlots[i].fb_a()) + suffix);
                        }
                    }
                }
                html += '</div>';
            }

            // ========== SEMI-FINALS ==========
            html += '<div class="bracket-round"><div class="bracket-round-title">' + _('semiFinals') + '</div>';
            const sfs = allMatches.filter(m => m.type === 'semi_final');
            if (isU14 && !isGirls) {
                // U14 Boys: SF1=A1vB2, SF2=B1vA2 — from match data or standings
                const sf1 = sfs.find(m => m.round && m.round.includes('1'));
                const sf2 = sfs.find(m => m.round && m.round.includes('2'));
                if (sf1 && sf1.home && sf1.home !== 'TBD') {
                    html += renderMatch(_('SF1'), tn(sf1.home) + suffix, tn(sf1.away) + suffix, '', sf1);
                } else {
                    html += renderMatch(_('SF1'), tn(getTeam(sA,0)) + suffix, tn(getTeam(sB,1)) + suffix);
                }
                if (sf2 && sf2.home && sf2.home !== 'TBD') {
                    html += renderMatch(_('SF2'), tn(sf2.home) + suffix, tn(sf2.away) + suffix, '', sf2);
                } else {
                    html += renderMatch(_('SF2'), tn(getTeam(sB,0)) + suffix, tn(getTeam(sA,1)) + suffix);
                }
            } else if (isU14 && isGirls) {
                // U14 Girls: SF1=Winner QF1 v Winner QF4, SF2=Winner QF3 v Winner QF2
                const sf1 = sfs.find(m => m.round && m.round.includes('1'));
                const sf2 = sfs.find(m => m.round && m.round.includes('2'));
                if (sf1 && sf1.home && sf1.home !== 'TBD') {
                    html += renderMatch(_('SF1'), tn(sf1.home) + suffix, tn(sf1.away) + suffix, '', sf1);
                } else {
                    html += renderMatch(_('SF1'), _('winner') + ' QF1', _('winner') + ' QF4');
                }
                if (sf2 && sf2.home && sf2.home !== 'TBD') {
                    html += renderMatch(_('SF2'), tn(sf2.home) + suffix, tn(sf2.away) + suffix, '', sf2);
                } else {
                    html += renderMatch(_('SF2'), _('winner') + ' QF3', _('winner') + ' QF2');
                }
            } else {
                // U12: SF from match data
                const sf1 = sfs.find(m => m.round && m.round.includes('1'));
                const sf2 = sfs.find(m => m.round && m.round.includes('2'));
                if (sf1 && sf1.home && sf1.home !== 'TBD') {
                    html += renderMatch(_('SF1'), tn(sf1.home) + suffix, tn(sf1.away) + suffix, '', sf1);
                } else {
                    html += renderMatch(_('SF1'), _('winner') + ' QF1', _('winner') + ' QF4');
                }
                if (sf2 && sf2.home && sf2.home !== 'TBD') {
                    html += renderMatch(_('SF2'), tn(sf2.home) + suffix, tn(sf2.away) + suffix, '', sf2);
                } else {
                    html += renderMatch(_('SF2'), _('winner') + ' QF3', _('winner') + ' QF2');
                }
            }
            html += '</div>';

            // ========== FINAL + THIRD PLACE ==========
            html += '<div class="bracket-round"><div class="bracket-round-title">' + _('finals') + '</div>';
            const finalMatch = allMatches.find(m => m.type === 'final' && m.home && m.home !== 'TBD');
            const thirdMatch = allMatches.find(m => m.type === 'third_place' && m.home && m.home !== 'TBD');
            if (finalMatch) {
                html += renderMatch(_('final'), tn(finalMatch.home) + suffix, tn(finalMatch.away) + suffix, 'final', finalMatch);
            } else {
                html += renderMatch(_('final'), _('winner') + ' SF1', _('winner') + ' SF2', 'final');
            }
            if (thirdMatch) {
                html += renderMatch(_('thirdPlace'), tn(thirdMatch.home) + suffix, tn(thirdMatch.away) + suffix, 'third', thirdMatch);
            } else {
                html += renderMatch(_('thirdPlace'), _('loser') + ' SF1', _('loser') + ' SF2', 'third');
            }
            html += '</div>';
            return html;
        }

        function renderPlateBracket(sA, sB, isU14, isGirls, teamsPerGroup, mA, mB, allMatches) {
                    const done = isGroupComplete(mA) && isGroupComplete(mB);
                    const suffix = done ? '' : ' *';
                    let html = '';

                    // ========== PLATE SEMI-FINALS ==========
                    html += '<div class="bracket-round"><div class="bracket-round-title">' + _('plateSemiFinals') + '</div>';
                    const plateSFs = allMatches.filter(m => m.type === 'plate_semi_final');
                    if (isU14 && !isGirls) {
                        // U14 Boys: Plate SF1(A3vB4), Plate SF2(B3vA4)
                        const psf1 = plateSFs.find(m => m.round && m.round.includes('1'));
                        const psf2 = plateSFs.find(m => m.round && m.round.includes('2'));
                        if (psf1 && psf1.home && psf1.home !== 'TBD') {
                            html += renderMatch('Plate SF1', tn(psf1.home) + suffix, tn(psf1.away) + suffix, 'plate', psf1);
                        } else {
                            html += renderMatch('Plate SF1', tn(getTeam(sA,2)) + suffix, tn(getTeam(sB,3)) + suffix, 'plate');
                        }
                        if (psf2 && psf2.home && psf2.home !== 'TBD') {
                            html += renderMatch('Plate SF2', tn(psf2.home) + suffix, tn(psf2.away) + suffix, 'plate', psf2);
                        } else {
                            html += renderMatch('Plate SF2', tn(getTeam(sB,2)) + suffix, tn(getTeam(sA,3)) + suffix, 'plate');
                        }
                    } else if (isU14 && isGirls) {
                        // U14 Girls: Plate SF from QF losers (Loser QF4 v Loser QF1, Loser QF2 v Loser QF3)
                        const psf1 = plateSFs.find(m => m.round && m.round.includes('Loser QF4'));
                        const psf2 = plateSFs.find(m => m.round && m.round.includes('Loser QF2'));
                        if (psf1 && psf1.home && psf1.home !== 'TBD') {
                            html += renderMatch('Plate SF1', tn(psf1.home) + suffix, tn(psf1.away) + suffix, 'plate', psf1);
                        } else {
                            html += renderMatch('Plate SF1', _('loser') + ' QF4', _('loser') + ' QF1', 'plate');
                        }
                        if (psf2 && psf2.home && psf2.home !== 'TBD') {
                            html += renderMatch('Plate SF2', tn(psf2.home) + suffix, tn(psf2.away) + suffix, 'plate', psf2);
                        } else {
                            html += renderMatch('Plate SF2', _('loser') + ' QF2', _('loser') + ' QF3', 'plate');
                        }
                    } else {
                        // U12: Plate SF from QF losers — read from match data
                        const psfs = plateSFs;
                        if (psfs.length >= 1 && psfs[0].home && psfs[0].home !== 'TBD') {
                            html += renderMatch('Plate SF1', tn(psfs[0].home) + suffix, tn(psfs[0].away) + suffix, 'plate', psfs[0]);
                        } else {
                            html += renderMatch('Plate SF1', _('loser') + ' QF4', _('loser') + ' QF1', 'plate');
                        }
                        if (psfs.length >= 2 && psfs[1].home && psfs[1].home !== 'TBD') {
                            html += renderMatch('Plate SF2', tn(psfs[1].home) + suffix, tn(psfs[1].away) + suffix, 'plate', psfs[1]);
                        } else {
                            html += renderMatch('Plate SF2', _('loser') + ' QF2', _('loser') + ' QF3', 'plate');
                        }
                    }
                    html += '</div>';

                    // ========== PLATE FINAL + THIRD PLACE ==========
                    html += '<div class="bracket-round"><div class="bracket-round-title">' + _('plateFinals') + '</div>';
                    const plateFinal = allMatches.find(m => m.type === 'plate_final' && m.home && m.home !== 'TBD');
                    const plateThird = allMatches.find(m => m.type === 'plate_third_place' && m.home && m.home !== 'TBD');
                    if (plateFinal) {
                        html += renderMatch(_('plateFinal'), tn(plateFinal.home) + suffix, tn(plateFinal.away) + suffix, 'plate', plateFinal);
                    } else {
                        html += renderMatch(_('plateFinal'), _('winner') + ' Plate SF1', _('winner') + ' Plate SF2', 'plate');
                    }
                    if (plateThird) {
                        html += renderMatch(_('plateThird'), tn(plateThird.home) + suffix, tn(plateThird.away) + suffix, 'plate', plateThird);
                    } else {
                        html += renderMatch(_('plateThird'), _('loser') + ' Plate SF1', _('loser') + ' Plate SF2', 'plate');
                    }
                    html += '</div>';

                    // ========== 9TH PLACE ==========
                    if (teamsPerGroup >= 5) {
                        html += '<div class="bracket-round" style="margin-top:20px;">';
                        html += '<div class="bracket-round-title">' + _('p9thPlayoff') + '</div>';
                        const ninthMatch = allMatches.find(m => m.type === '9th_place');
                        if (ninthMatch && ninthMatch.home && ninthMatch.home !== 'TBD') {
                            html += renderMatch(_('p9thPlace'), tn(ninthMatch.home) + suffix, tn(ninthMatch.away) + suffix, 'plate', ninthMatch);
                        } else {
                            html += renderMatch(_('p9thPlace'), tn(getTeam(sA,4)) + suffix, tn(getTeam(sB,4)) + suffix, 'plate');
                        }
                        html += '</div>';
                    }

                    return html;
                }

        function renderMatch(round, home, away, type, matchObj) {
            type = type || 'cup';
            const h = String(home), a = String(away);
            const nnH = h.replace(' *','') === 'Nanning' || h.includes('南宁'), nnA = a.replace(' *','') === 'Nanning' || a.includes('南宁');
            const hs = (matchObj && matchObj.home_score !== null && matchObj.home_score !== undefined) ? matchObj.home_score : '-';
            const aws = (matchObj && matchObj.away_score !== null && matchObj.away_score !== undefined) ? matchObj.away_score : '-';
            return '<div class="bracket-match ' + type + '">' +
                '<div class="bracket-match-header">' + round + '</div>' +
                '<div class="bracket-team-row">' +
                    '<span class="bracket-team-name' + (nnH ? ' nanning' : '') + '">' + (nnH ? '&#x1F525; ' : '') + h + '</span>' +
                    '<span class="bracket-score">' + hs + '</span>' +
                '</div>' +
                '<div class="bracket-team-row">' +
                    '<span class="bracket-team-name' + (nnA ? ' nanning' : '') + '">' + (nnA ? '&#x1F525; ' : '') + a + '</span>' +
                    '<span class="bracket-score">' + aws + '</span>' +
                '</div>' +
            '</div>';
        }

        function getTeam(standings, idx) {
            return idx < standings.length ? standings[idx].team : _('rank') + ' ' + (idx + 1);
        }

        // ---- Match Cards ----
        function renderMatches(matches) {
            if (matches.length === 0) return '<div class="loading">' + _('noMatchData') + '</div>';
            let html = '<div class="matches-grid">';
            matches.forEach(m => {
                const nnH = m.home === 'Nanning', nnA = m.away === 'Nanning';
                const hasScore = m.home_score !== null && m.away_score !== null;
                const cardClass = m.type === 'group' ? '' : m.type === 'final' ? 'final' : 'knockout';
                html += '<div class="match-card ' + cardClass + '">' +
                    '<div class="match-header">' +
                        '<span class="match-round">' + translateRound(m.round) + '</span>' +
                        '<span class="match-time">' + toBeijingTime(m.ko) + '</span>' +
                    '</div>' +
                    '<div class="match-teams">' +
                        '<div class="team"><div class="team-name' + (nnH ? ' nanning' : '') + '">' + (nnH ? '&#x1F525; ' : '') + tn(m.home) + '</div></div>' +
                        '<div class="score">' + (hasScore ? m.home_score : '-') + '</div>' +
                        '<div class="score-divider">:</div>' +
                        '<div class="score">' + (hasScore ? m.away_score : '-') + '</div>' +
                        '<div class="team"><div class="team-name' + (nnA ? ' nanning' : '') + '">' + (nnA ? '&#x1F525; ' : '') + tn(m.away) + '</div></div>' +
                    '</div>' +
                    '<div class="match-venue">' + (m.venue || '') + '</div>' +
                '</div>';
            });
            html += '</div>';
            return html;
        }

        // Auto-refresh every 30 minutes
        setInterval(loadData, 30 * 60 * 1000);
    })();
    </script>
</body>
</html>
