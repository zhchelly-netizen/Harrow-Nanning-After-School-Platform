<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试奖学金页面</title>
    <link rel="stylesheet" href="styles/main.css?v=20260318">
    <link rel="stylesheet" href="styles/scholarship.css?v=20260318">
</head>
<body style="padding: 2rem;">
    <h1>测试核心样式</h1>
    
    <h2>1. 评价类别测试</h2>
    <div class="categories-grid-compact">
        <div class="category-card-compact academic-cat">
            <h4>学术</h4>
            <p class="category-desc">学科成绩、学术竞赛、考级认证等</p>
        </div>
        <div class="category-card-compact arts-cat">
            <h4>艺术</h4>
            <div class="arts-subcategories">
                <span class="subcategory-tag">音乐与表演艺术</span>
                <span class="subcategory-tag">视觉艺术</span>
            </div>
        </div>
    </div>
    
    <h2>2. 核心价值观测试</h2>
    <div class="core-values-section">
        <h3>核心价值观 Core Values</h3>
        <p class="values-intro">奖学金获得者需展现出我们的核心价值观：</p>
        <div class="values-grid">
            <div class="value-card courage">
                <span class="value-icon">💪</span>
                <h4>勇气 Courage</h4>
                <p>敢于挑战、勇于尝试、展现雄心与毅力</p>
            </div>
            <div class="value-card honour">
                <span class="value-icon">🎖️</span>
                <h4>荣誉 Honour</h4>
                <p>诚实正直、尊重他人、维护学校声誉</p>
            </div>
        </div>
    </div>
</body>
</html>
